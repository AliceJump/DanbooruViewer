name: Build Release

on:
  push:
    tags:
      - "v*"
  # 添加手动触发用于测试
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.38.9"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: android
            os: ubuntu-latest

          - target: linux
            os: ubuntu-latest

          - target: web
            os: ubuntu-latest

          - target: ios
            os: macos-latest

          - target: windows
            os: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      # 🔍 调试信息
      - name: Debug - Print cache info
        run: |
          echo "Runner OS: ${{ runner.os }}"
          echo "Flutter Version: ${{ env.FLUTTER_VERSION }}"
          echo "pubspec.lock exists: $(test -f pubspec.lock && echo 'YES' || echo 'NO')"
          echo "pubspec.lock hash: ${{ hashFiles('**/pubspec.lock') }}"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true  # 这个已经缓存了 Flutter SDK

      # Pub 缓存（移除 Flutter SDK 缓存，因为上面已经处理）
      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      # ---------------- ANDROID ----------------
      - name: Cache Gradle
        if: matrix.target == 'android'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Decode Android signing keystore
        if: matrix.target == 'android'
        shell: bash
        run: |
          if [ -z "${{ secrets.SIGNING_KEY_STORE_BASE64 }}" ] || [ -z "${{ secrets.SIGNING_STORE_PASSWORD }}" ] || [ -z "${{ secrets.SIGNING_KEY_ALIAS }}" ] || [ -z "${{ secrets.SIGNING_KEY_PASSWORD }}" ]; then
            echo "Android signing secrets are required for release builds."
            exit 1
          fi
          echo "${{ secrets.SIGNING_KEY_STORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/keystore.jks"
          echo "SIGNING_KEY_STORE_PATH=$RUNNER_TEMP/keystore.jks" >> "$GITHUB_ENV"
          echo "SIGNING_STORE_PASSWORD=${{ secrets.SIGNING_STORE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "SIGNING_KEY_ALIAS=${{ secrets.SIGNING_KEY_ALIAS }}" >> "$GITHUB_ENV"
          echo "SIGNING_KEY_PASSWORD=${{ secrets.SIGNING_KEY_PASSWORD }}" >> "$GITHUB_ENV"

      - name: Build Android APK
        if: matrix.target == 'android'
        run: |
          flutter build apk --release --split-per-abi
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk release/danbooru-viewer-android-arm64-v8a.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk release/danbooru-viewer-android-armeabi-v7a.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk release/danbooru-viewer-android-x86_64.apk

      - name: Upload Android
        if: matrix.target == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: release/*.apk

      # ---------------- LINUX ----------------
      - name: Install Linux deps
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Build Linux
        if: matrix.target == 'linux'
        run: |
          flutter build linux --release
          tar -czf danbooru-viewer-linux-release.tar.gz \
            -C build/linux/x64/release/bundle .

      - name: Upload Linux
        if: matrix.target == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: danbooru-viewer-linux-release.tar.gz

      # ---------------- WEB ----------------
      - name: Build Web
        if: matrix.target == 'web'
        run: |
          flutter build web --release
          tar -czf danbooru-viewer-web-release.tar.gz -C build web

      - name: Upload Web
        if: matrix.target == 'web'
        uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: danbooru-viewer-web-release.tar.gz

      # ---------------- IOS ----------------
      - name: Build iOS
        if: matrix.target == 'ios'
        run: |
          flutter build ios --release --no-codesign
          mkdir Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r app.ipa Payload

      - name: Upload iOS
        if: matrix.target == 'ios'
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: app.ipa

      # ---------------- WINDOWS ----------------
      - name: Build Windows
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          flutter build windows --release
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (-not (Test-Path -LiteralPath 'build/windows/x64/runner/Release')) {
            throw 'Windows release output directory was not created.'
          }
          Compress-Archive `
            -Path build/windows/x64/runner/Release/* `
            -DestinationPath danbooru-viewer-windows-release.zip `
            -Force

      - name: Upload Windows
        if: matrix.target == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: danbooru-viewer-windows-release.zip

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate Changelog
        id: changelog
        shell: bash
        run: |
          # 获取当前 tag
          CURRENT_TAG="${{ github.ref_name }}"

          # 获取前一个 tag
          PREV_TAG=$(git tag -l 'v*' --sort=-version:refname | grep -v "^$CURRENT_TAG$" | head -1)

          # 生成 changelog（过滤 Bump version 消息）
          echo "## 变更日志 ($CURRENT_TAG)" > /tmp/release_body.md
          echo "" >> /tmp/release_body.md

          if [ -z "$PREV_TAG" ]; then
            git log "$CURRENT_TAG" --oneline --no-decorate | grep -v "Bump version to" >> /tmp/release_body.md
          else
            echo "从 $PREV_TAG 到 $CURRENT_TAG 的变更:" >> /tmp/release_body.md
            echo "" >> /tmp/release_body.md
            git log "$PREV_TAG..$CURRENT_TAG" --oneline --no-decorate | grep -v "Bump version to" >> /tmp/release_body.md
          fi

          echo "" >> /tmp/release_body.md
          echo "---" >> /tmp/release_body.md
          echo "" >> /tmp/release_body.md
          # 追加下载说明
          cat >> /tmp/release_body.md << 'DOWNLOADS'
            ## 下载说明

            | 平台 | 推荐下载 | 说明 |
            | --- | --- | --- |
            | Android ARM64 | [danbooru-viewer-android-arm64-v8a.apk](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/danbooru-viewer-android-arm64-v8a.apk) | 大多数现代 Android 手机和平板 |
            | Android ARMv7 | [danbooru-viewer-android-armeabi-v7a.apk](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/danbooru-viewer-android-armeabi-v7a.apk) | 较旧的 32 位 Android 设备 |
            | Android x86_64 | [danbooru-viewer-android-x86_64.apk](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/danbooru-viewer-android-x86_64.apk) | Android 模拟器或 x86_64 设备 |
            | Windows | [danbooru-viewer-windows-release.zip](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/danbooru-viewer-windows-release.zip) | 解压后运行 `danbooru_viewer.exe` |
            | Linux | [danbooru-viewer-linux-release.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/danbooru-viewer-linux-release.tar.gz) | 解压后运行应用程序 |
            | iOS | [app.ipa](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/app.ipa) | 未签名 IPA，需要自行签名或侧载 |
            | Web | [danbooru-viewer-web-release.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/danbooru-viewer-web-release.tar.gz) | 静态网页构建产物 |
            DOWNLOADS

          # 输出 changelog 内容（用于 action 日志调试）
          echo "=== Generated Changelog ==="
          cat /tmp/release_body.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          body_path: /tmp/release_body.md
